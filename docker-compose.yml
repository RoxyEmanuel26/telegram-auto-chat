version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: telehub-postgres
    restart: always
    environment:
      POSTGRES_USER: telehub
      POSTGRES_PASSWORD: telehubpassword
      POSTGRES_DB: telehub_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: telehub-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
